<!doctype html>
<html lang="zh-CN">
<head>
  <title>{{.Title}} - {{.SEO.SiteName}}</title>
  <meta property="og:title" content="{{.Title}} - {{.SEO.SiteName}}">
  {{template "head_common" .}}
</head>
<body class="page-404">
  <div class="sparkle sparkle-a"></div>
  <div class="sparkle sparkle-b"></div>
  <main class="container">
    <header class="page-header">
      <p class="kicker">Not Found</p>
      <h1>404</h1>
      <p class="subtitle">{{.Message}}</p>
      {{template "site_nav_top" .}}
    </header>

    <section>
      <p class="empty">你访问的页面不存在，试试从导航回到主线内容。</p>
    </section>
  </main>
</body>
</html>
