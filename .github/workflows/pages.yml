name: Deploy Pages

on:
  push:
    branches: ["blog"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Resolve base path
        shell: bash
        run: |
          if [ -n "${{ vars.PAGES_BASE_PATH }}" ]; then
            echo "PAGES_BASE_PATH=${{ vars.PAGES_BASE_PATH }}" >> "$GITHUB_ENV"
          else
            echo "PAGES_BASE_PATH=/${{ github.event.repository.name }}" >> "$GITHUB_ENV"
          fi

      - name: Build static site
        run: go run ./cmd/build -out dist -base-path "${PAGES_BASE_PATH}"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
