<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{.Title}} - Folio</title>
  <meta name="description" content="{{.SEO.Description}}">
  <link rel="canonical" href="{{.SEO.CanonicalURL}}">
  <meta property="og:type" content="{{.SEO.OGType}}">
  <meta property="og:site_name" content="{{.SEO.SiteName}}">
  <meta property="og:title" content="{{.Title}} - Folio">
  <meta property="og:description" content="{{.SEO.Description}}">
  <meta property="og:url" content="{{.SEO.OGURL}}">
  <link rel="stylesheet" href="{{.BasePath}}/static/style.css">
</head>
<body>
  <main class="container">
    <header class="page-header">
      <h1>搜索</h1>
      <nav class="top-nav">
        <a href="{{.BasePath}}/">首页</a>
        <a href="{{.BasePath}}/tags">标签</a>
        <a href="{{.BasePath}}/archives">归档</a>
        <a href="{{.BasePath}}/search">搜索</a>
      </nav>
    </header>

    <section class="search-panel" data-base-path="{{.BasePath}}">
      <input id="q" class="search-input" type="search" placeholder="输入关键词（标题、标签、正文）">
      <p id="search-meta" class="meta">输入关键词后开始搜索。</p>
      <div id="search-results" class="post-list"></div>
    </section>
  </main>

  <script>
    (async function () {
      const panel = document.querySelector(".search-panel");
      const basePath = panel?.dataset.basePath || "";
      const input = document.getElementById("q");
      const meta = document.getElementById("search-meta");
      const results = document.getElementById("search-results");
      let docs = [];

      function escapeHtml(str) {
        return str
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function render(list, keyword) {
        if (!keyword) {
          meta.textContent = "输入关键词后开始搜索。";
          results.innerHTML = "";
          return;
        }

        meta.textContent = `找到 ${list.length} 条结果`;
        if (!list.length) {
          results.innerHTML = "<p>没有匹配结果。</p>";
          return;
        }

        results.innerHTML = list.map((doc) => {
          const snippet = (doc.content || "").slice(0, 120);
          const tags = (doc.tags || []).map((t) => `<span>#${escapeHtml(t)}</span>`).join("");
          return `
            <a class="post-card-link" href="${basePath}/post/${encodeURIComponent(doc.slug)}">
              <article class="post-card">
                <h2>${escapeHtml(doc.title || "")}</h2>
                <p class="meta">${escapeHtml(doc.date || "")}</p>
                ${tags ? `<p class="tags">${tags}</p>` : ""}
                ${snippet ? `<p>${escapeHtml(snippet)}...</p>` : ""}
              </article>
            </a>
          `;
        }).join("");
      }

      try {
        const resp = await fetch(`${basePath}/search-index.json`, { cache: "no-store" });
        docs = await resp.json();
      } catch (err) {
        meta.textContent = "搜索索引加载失败。";
        return;
      }

      const run = () => {
        const keyword = input.value.trim().toLowerCase();
        if (!keyword) {
          render([], "");
          return;
        }
        const matched = docs.filter((doc) => {
          const hay = `${doc.title || ""} ${(doc.tags || []).join(" ")} ${doc.content || ""}`.toLowerCase();
          return hay.includes(keyword);
        });
        render(matched, keyword);
      };

      input.addEventListener("input", run);
    })();
  </script>
</body>
</html>
