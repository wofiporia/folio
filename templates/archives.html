<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{.Title}} - Folio</title>
  <link rel="stylesheet" href="{{.BasePath}}/static/style.css">
</head>
<body>
  <main class="container">
    <header class="page-header">
      <h1>归档</h1>
      <nav class="top-nav">
        <a href="{{.BasePath}}/">首页</a>
        <a href="{{.BasePath}}/tags">标签</a>
        <a href="{{.BasePath}}/archives">归档</a>
      </nav>
    </header>

    {{if .Groups}}
    <section class="archive-list">
      {{range .Groups}}
      <article class="archive-group">
        <h2>{{.Label}}</h2>
        <ul>
          {{range .Posts}}
          <li>
            <span class="meta">{{.DateDisplay}}</span>
            <a href="{{$.BasePath}}/post/{{.Slug}}">{{.Title}}</a>
          </li>
          {{end}}
        </ul>
      </article>
      {{end}}
    </section>
    {{else}}
    <p>暂无归档内容。</p>
    {{end}}
  </main>
</body>
</html>
