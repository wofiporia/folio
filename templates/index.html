<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{.Title}}</title>
  <link rel="stylesheet" href="{{.BasePath}}/static/style.css">
</head>
<body>
  <main class="container">
    <header class="page-header">
      <h1>Folio</h1>
      <p>一个基于 Go + 文件系统的轻量博客</p>
      <nav class="top-nav">
        <a href="{{.BasePath}}/">首页</a>
        <a href="{{.BasePath}}/tags">标签</a>
        <a href="{{.BasePath}}/archives">归档</a>
      </nav>
    </header>

    <section class="post-list">
      {{if .Posts}}
      {{range .Posts}}
      <a class="post-card-link" href="{{$.BasePath}}/post/{{.Slug}}">
        <article class="post-card">
          <h2>{{.Title}}</h2>
          <p class="meta">{{.DateDisplay}}</p>
          {{if .Tags}}
          <p class="tags">
            {{range .Tags}}<span>#{{.}}</span>{{end}}
          </p>
          {{end}}
        </article>
      </a>
      {{end}}
      {{else}}
      <p>暂无文章。</p>
      {{end}}
    </section>
  </main>
</body>
</html>
