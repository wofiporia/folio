<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{.Title}}</title>
  <meta name="description" content="{{.SEO.Description}}">
  <link rel="canonical" href="{{.SEO.CanonicalURL}}">
  <meta property="og:type" content="{{.SEO.OGType}}">
  <meta property="og:site_name" content="{{.SEO.SiteName}}">
  <meta property="og:title" content="{{.Title}}">
  <meta property="og:description" content="{{.SEO.Description}}">
  <meta property="og:url" content="{{.SEO.OGURL}}">
  {{if .SEO.OGImage}}<meta property="og:image" content="{{.SEO.OGImage}}">{{end}}
  {{if .SEO.PublishedTime}}
  <meta property="article:published_time" content="{{.SEO.PublishedTime}}">
  {{end}}
  <link rel="icon" type="image/png" href="{{.BasePath}}/static/favicon.png">
  <link rel="stylesheet" href="{{.BasePath}}/static/style.css">
</head>
<body>
  <main class="container">
    <nav class="back-nav">
      <a href="{{.BasePath}}/">首页</a>
      <a href="{{.BasePath}}/tags">标签</a>
      <a href="{{.BasePath}}/archives">归档</a>
      <a href="{{.BasePath}}/search">搜索</a>
    </nav>
    <article class="post-detail">
      <header>
        <h1>{{.Post.Title}}</h1>
        <p class="meta">{{.Post.DateDisplay}}{{if .Post.Author}} · {{.Post.Author}}{{end}}</p>
        {{if .Post.Tags}}
        <p class="tags">
          {{range .Post.Tags}}
          <a class="tag-link" href="{{tagURL .}}">#{{.}}</a>
          {{end}}
        </p>
        {{end}}
      </header>
      <section class="content">{{.Post.HTML}}</section>
    </article>
  </main>
</body>
</html>
